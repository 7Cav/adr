services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: cavapps
      POSTGRES_USER: cavapps
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cavapps -d cavapps"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cavapps-network

  server:
    restart: always
    build:
      dockerfile: "./server.Dockerfile"
      context: "./server"
    image: 7cav/cavapps-server:latest
    container_name: cavapps-server
    ports:
      - "4000:4000"
    environment:
      API_TOKEN:
      CLIENT_TOKEN:
      DATABASE_URL: postgres://cavapps:${PG_PASSWORD}@postgres:5432/cavapps?sslmode=disable
      DIFF_POLL_SCHEDULE: ${DIFF_POLL_SCHEDULE:-*/15 * * * *}
      DIFF_SNAPSHOT_RETAIN_DAYS: ${DIFF_SNAPSHOT_RETAIN_DAYS:-95}
      XENFORO_DB_HOST: xenforo-db
      XENFORO_DB_PORT: 3306
      XENFORO_DB_USER: xenforo
      XENFORO_DB_PASSWORD: ${XENFORO_DB_PASSWORD}
      XENFORO_DB_NAME: xenforo
    working_dir: /server
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cavapps-network
      - xenforo_internal

  client:
    restart: always
    build:
      context: ./client
      dockerfile: ./client.Dockerfile
    image: 7cav/cavapps-client:latest
    container_name: cavapps-client
    volumes:
      - ./client:/client
    ports:
      - "80:3000"
    environment:
      NEXT_PUBLIC_CLIENT_TOKEN: ${CLIENT_TOKEN}
      COMBAT_API_URL: http://server:4000/roster/combat
      RESERVE_API_URL: http://server:4000/roster/reserves
      NEXT_PUBLIC_INDIVIDUAL_API_URL: http://server:4000/roster/individual
      CACHE_TIMESTAMP_URL: http://server:4000/cache-timestamp
      GROUP_API_URL: http://server:4000/roster/groups
      NEXT_PUBLIC_DIFF_API_URL: ${NEXT_PUBLIC_DIFF_API_URL:-http://localhost:4000}
    working_dir: /client
    depends_on:
      server:
        condition: service_healthy
    entrypoint: /bin/sh -c "until wget -q --spider http://server:4000; do echo 'Waiting for server...'; sleep 5; done; npm install && npm run build && npm run start"
    networks:
      - cavapps-network

networks:
  cavapps-network:
    driver: bridge
  xenforo_internal:
    external: true
    name: xenforo_internal

volumes:
  pgdata:
