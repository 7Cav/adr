name: AWARD_SPRITES

on:
  push:
    paths:
      - "uniform-uploads/**"
    branches-ignore:
      - "award-sprites/**"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: award-sprites-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate_sprites:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Repo
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run generator tests
        run: npm test

      - name: Generate sprite sheets
        id: generate
        shell: bash
        run: |
          set -o pipefail
          # Read the manifest BEFORE generating: the generator empties it on
          # success, so afterwards there is no way to tell a push that had work
          # to do from one that did not, which is what made "no sheet changes"
          # below report a guess as a fact.
          #
          # Both the exit status AND the output are checked. `-e` would already
          # abort the step on a non-zero jq, but jq can also exit 0 having
          # printed nothing (an empty file) or several lines (a stream of
          # documents). Either would leave ENTRY_COUNT non-numeric, and
          # `[ "$ENTRY_COUNT" -gt 0 ]` fails on that WITHOUT tripping `-e`,
          # because a failing `if` condition is not an error — so the guard
          # would silently take the "nothing to generate" branch about a
          # manifest it never read. That is the inference this step exists to
          # remove, so it must not be how the step itself fails.
          if ! ENTRY_COUNT=$(jq 'if type == "array" then length else 1 end' uniform-uploads/manifest.json) \
             || ! [ "$ENTRY_COUNT" -eq "$ENTRY_COUNT" ] 2>/dev/null; then
            echo "::error::could not read uniform-uploads/manifest.json as a JSON document (jq produced '$ENTRY_COUNT')"
            exit 1
          fi
          if [ "$ENTRY_COUNT" -gt 0 ]; then
            echo "had_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "had_work=false" >> "$GITHUB_OUTPUT"
          fi
          npm run sprites:generate 2>&1 | tee sprite-gen.log
          WARNINGS=$(grep '^WARN:' sprite-gen.log || true)
          [ -z "$WARNINGS" ] && WARNINGS="(none)"
          {
            echo "warnings<<SPRITE_EOF"
            echo "$WARNINGS"
            echo "SPRITE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect sprite-sheet changes
        id: changes
        shell: bash
        env:
          HAD_WORK: ${{ steps.generate.outputs.had_work }}
        run: |
          if [ -n "$(git status --porcelain client/public/skunkworks/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$HAD_WORK" = "true" ]; then
            # A backstop, not the identical-art check. The generator itself now
            # refuses a run that would change no pixel, and it does so before
            # deleting anything, which git cannot do from out here: writeSheet
            # re-encodes from raw, so its output differs from a committed sheet
            # over PNG metadata alone and "the file changed" is not the same
            # question as "the art changed". Reaching this branch means the
            # generator claimed to have spliced something and the working tree
            # disagrees — no known cause, so fail rather than guess one.
            echo "::error::Manifest had entries and the generator reported success, but no sprite sheet changed on disk. That combination is not expected — the generator refuses a no-op run itself. Do not merge; report this with the run log attached."
            exit 1
          elif [ "$HAD_WORK" = "false" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Manifest was empty; nothing to generate. Skipping PR."
          else
            echo "::error::had_work was '$HAD_WORK'; the manifest probe did not run, so whether there was work to do is unknown"
            exit 1
          fi

      - name: Verify formatting
        if: steps.changes.outputs.changed == 'true'
        run: npm run format:check

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: award-sprites/${{ github.ref_name }}
          base: ${{ github.ref_name }}
          add-paths: |
            client/public/skunkworks/**
            uniform-uploads/**
          commit-message: "chore(uniformbuilder): regenerate award sprite sheets"
          title: "chore(uniformbuilder): regenerate award sprite sheets"
          body: |
            Automated sprite-sheet regeneration from `uniform-uploads/`.

            This PR contains only the regenerated sprite-sheet PNG(s) and the
            upload-folder cleanup (consumed source art removed, manifest
            emptied). Placement was read from `constants/awardCatalog.js`.

            **Generator warnings** — a medal scaled to fit its tile with
            transparent margin left over, or a PNG left in the upload folder
            that no manifest entry claimed (that one means an award you may
            have meant to include did not get a tile). A wrong-sized ribbon
            source, a flattened medal source, and art identical to the tile
            already in place are all errors rather than warnings, so they fail
            the run instead of reaching this list:

            ```
            ${{ steps.generate.outputs.warnings }}
            ```

            Review that the new award renders correctly in both racks and that
            nothing below the insert point shifted, then merge.
