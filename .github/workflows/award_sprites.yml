name: AWARD_SPRITES

on:
  push:
    paths:
      - "uniform-uploads/**"
    branches-ignore:
      - "award-sprites/**"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: award-sprites-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate_sprites:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Repo
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run generator tests
        run: npm test

      - name: Generate sprite sheets
        id: generate
        shell: bash
        run: |
          set -o pipefail
          # Read the manifest BEFORE generating: the generator empties it on
          # success, so afterwards there is no way to tell a push that had work
          # to do from one that did not — which is what made "no sheet changes"
          # below report a guess as a fact.
          if [ "$(jq 'if type == "array" then length else 1 end' uniform-uploads/manifest.json)" -gt 0 ]; then
            echo "had_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "had_work=false" >> "$GITHUB_OUTPUT"
          fi
          npm run sprites:generate 2>&1 | tee sprite-gen.log
          WARNINGS=$(grep '^WARN:' sprite-gen.log || true)
          [ -z "$WARNINGS" ] && WARNINGS="(none)"
          {
            echo "warnings<<SPRITE_EOF"
            echo "$WARNINGS"
            echo "SPRITE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect sprite-sheet changes
        id: changes
        shell: bash
        env:
          HAD_WORK: ${{ steps.generate.outputs.had_work }}
        run: |
          if [ -n "$(git status --porcelain client/public/skunkworks/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$HAD_WORK" = "true" ]; then
            # The generator reported success and consumed the sources, yet no
            # sheet moved. The uploaded art was byte-identical to what was
            # already there, so the PNGs have been deleted for nothing. Fail
            # rather than skip: this used to be reported as a manifest-only
            # push, which is the one thing it definitely was not.
            echo "::error::Manifest had entries and the generator succeeded, but no sprite sheet changed — the uploaded art was identical to the tiles already in place, and the sources have been consumed. Restore them from this push and check you uploaded the intended files."
            exit 1
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Manifest was empty; nothing to generate. Skipping PR."
          fi

      - name: Verify formatting
        if: steps.changes.outputs.changed == 'true'
        run: npm run format:check

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: award-sprites/${{ github.ref_name }}
          base: ${{ github.ref_name }}
          add-paths: |
            client/public/skunkworks/**
            uniform-uploads/**
          commit-message: "chore(uniformbuilder): regenerate award sprite sheets"
          title: "chore(uniformbuilder): regenerate award sprite sheets"
          body: |
            Automated sprite-sheet regeneration from `uniform-uploads/`.

            This PR contains only the regenerated sprite-sheet PNG(s) and the
            upload-folder cleanup (consumed source art removed, manifest
            emptied). Placement was read from `constants/awardCatalog.js`.

            **Generator warnings** (e.g. a medal placed with a transparent gap,
            or a ribbon stretched from a wrong-sized source):

            ```
            ${{ steps.generate.outputs.warnings }}
            ```

            Review that the new award renders correctly in both racks and that
            nothing below the insert point shifted, then merge.
