name: AWARD_SPRITES

on:
  push:
    paths:
      - "uniform-uploads/**"
    branches-ignore:
      - "award-sprites/**"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: award-sprites-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate_sprites:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Repo
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run generator tests
        run: npm test

      - name: Generate sprite sheets
        id: generate
        shell: bash
        run: |
          set -o pipefail
          # Read the manifest BEFORE generating: the generator empties it on
          # success, so afterwards there is no way to tell a push that had work
          # to do from one that did not, which is what made "no sheet changes"
          # below report a guess as a fact.
          #
          # Both the exit status AND the output are checked. `-e` would already
          # abort the step on a non-zero jq, but jq can also exit 0 having
          # printed nothing (an empty file) or several lines (a stream of
          # documents). Either would leave ENTRY_COUNT non-numeric, and
          # `[ "$ENTRY_COUNT" -gt 0 ]` fails on that WITHOUT tripping `-e`,
          # because a failing `if` condition is not an error — so the guard
          # would silently take the "nothing to generate" branch about a
          # manifest it never read. That is the inference this step exists to
          # remove, so it must not be how the step itself fails.
          if ! ENTRY_COUNT=$(jq 'if type == "array" then length else 1 end' uniform-uploads/manifest.json) \
             || ! [ "$ENTRY_COUNT" -eq "$ENTRY_COUNT" ] 2>/dev/null; then
            echo "::error::could not read uniform-uploads/manifest.json as a JSON document (jq produced '$ENTRY_COUNT')"
            exit 1
          fi
          if [ "$ENTRY_COUNT" -gt 0 ]; then
            echo "had_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "had_work=false" >> "$GITHUB_OUTPUT"
          fi
          npm run sprites:generate 2>&1 | tee sprite-gen.log
          # grep exits 1 for "no matches" and 2 for "something went wrong". A
          # bare `|| true` turns both into an empty string and then into
          # "(none)", so a grep that failed reads as a run that had nothing to
          # say. This block is the only channel by which a contributor learns
          # their art was not consumed; it must not report a guess.
          WARNINGS=$(grep '^WARN:' sprite-gen.log) || GREP_STATUS=$?
          if [ "${GREP_STATUS:-0}" -gt 1 ]; then
            echo "::error::could not scan sprite-gen.log for warnings (grep exited ${GREP_STATUS})"
            exit 1
          fi
          [ -z "$WARNINGS" ] && WARNINGS="(none)"
          {
            echo "warnings<<SPRITE_EOF"
            echo "$WARNINGS"
            echo "SPRITE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect sprite-sheet changes
        id: changes
        shell: bash
        env:
          HAD_WORK: ${{ steps.generate.outputs.had_work }}
        run: |
          if [ -n "$(git status --porcelain client/public/skunkworks/)" ]; then
            if [ "$HAD_WORK" != "true" ]; then
              # The other branches were rewritten to stop inferring from git
              # status alone; this is the one that opens the pull request, so it
              # gets the same treatment. A dirty sheet directory with nothing in
              # the manifest to have dirtied it means something other than the
              # generator wrote there — and `add-paths` below would commit it.
              echo "::error::client/public/skunkworks/ changed but the manifest had no entries (had_work='$HAD_WORK'). The generator had nothing to do, so something else wrote there. Not opening a PR."
              exit 1
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ "$HAD_WORK" = "true" ]; then
            # A backstop, not the identical-art check. The generator answers
            # that itself now, per tile and on pixels, before it deletes
            # anything — which git cannot do from out here. "The file changed"
            # is a question about the encoder, and it is not the question:
            # a sheet carries many awards, so identical bytes are not what "this
            # award's tile did not change" means, and the inference rots on any
            # sharp bump besides. Reaching this branch means the generator
            # claimed to have spliced something and the working tree disagrees —
            # no known cause, so fail rather than guess one.
            echo "::error::Manifest had entries and the generator reported success, but no sprite sheet changed on disk. That combination is not expected — the generator refuses a no-op run itself. Do not merge; report this with the run log attached."
            exit 1
          elif [ "$HAD_WORK" = "false" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Manifest was empty; nothing to generate. Skipping PR."
          else
            echo "::error::had_work was '$HAD_WORK'; the manifest probe did not run, so whether there was work to do is unknown"
            exit 1
          fi

      - name: Verify formatting
        if: steps.changes.outputs.changed == 'true'
        run: npm run format:check

      - name: Open pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: award-sprites/${{ github.ref_name }}
          base: ${{ github.ref_name }}
          add-paths: |
            client/public/skunkworks/**
            uniform-uploads/**
          commit-message: "chore(uniformbuilder): regenerate award sprite sheets"
          title: "chore(uniformbuilder): regenerate award sprite sheets"
          body: |
            Automated sprite-sheet regeneration from `uniform-uploads/`.

            This PR contains only the regenerated sprite-sheet PNG(s) and the
            upload-folder cleanup (consumed source art removed, manifest
            emptied). Placement was read from `constants/awardCatalog.js`.

            **Generator warnings.** Read these — the run succeeded, but each
            one is something it did not do:

            - a tile whose art was already exactly what was on the sheet, so
              that award is unchanged by this PR (expected when an award's art
              was fixed on one sheet only, since both sources must be supplied
              every time);
            - a medal scaled to fit its tile with transparent margin left over,
              or scaled up from a source smaller than the tile;
            - a PNG left in the upload folder that no manifest entry claimed,
              meaning an award you may have meant to include did not get a tile;
            - a source that vanished before the run could consume it, or a temp
              file the run could not clean up — neither should happen, so both
              are worth reporting.

            A wrong-sized ribbon source, a flattened medal source, and a run
            where *nothing* would change are errors rather than warnings, so
            they fail the run instead of reaching this list:

            ```
            ${{ steps.generate.outputs.warnings }}
            ```

            Review that the new award renders correctly in both racks and that
            nothing below the insert point shifted, then merge.
